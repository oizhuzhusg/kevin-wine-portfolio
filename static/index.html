<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Kevin Wine Portfolio</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>Kevin Wine Portfolio</h1>
        <p>个人酒窖库存、流转记录与品鉴笔记</p>
      </div>
      <nav class="tabs" aria-label="Primary">
        <button class="tab active" data-view="dashboard">Dashboard</button>
        <button class="tab" data-view="recommendations">Recommended</button>
        <button class="tab" data-view="inventory">Inventory</button>
        <button class="tab" data-view="cellar-log">Cellar Log</button>
        <button class="tab" data-view="tasting-notes">Tasting Notes</button>
      </nav>
    </header>

    <main>
      <section id="dashboard" class="view active">
        <div class="toolbar">
          <h2>Dashboard</h2>
          <button data-action="refresh">刷新</button>
        </div>
        <div id="dashboard-content"></div>
      </section>

      <section id="recommendations" class="view">
        <div class="toolbar">
          <h2>Recommended Wines</h2>
          <div class="filters">
            <input id="recommendation-search" placeholder="搜索生产者、酒款、产区" />
            <select id="recommendation-region"><option value="">全部产区</option></select>
            <select id="recommendation-color"><option value="">全部颜色</option><option value="red">红</option><option value="white">白</option></select>
            <select id="recommendation-status"><option value="">全部状态</option><option value="Wishlist">待尝试</option><option value="Purchased">已购买</option><option value="Tasted">已喝</option><option value="Approved">会回购</option><option value="Archived">不再关注</option></select>
          </div>
        </div>
        <div class="panel">
          <div id="recommendation-summary" class="recommendation-summary"></div>
          <div id="recommendation-table" class="table-wrap"></div>
        </div>
      </section>

      <section id="inventory" class="view">
        <div class="toolbar">
          <h2>Inventory</h2>
          <div class="filters">
            <input id="inventory-search" placeholder="搜索生产者、酒款、产区" />
            <select id="filter-cabinet"><option value="">全部酒柜</option><option value="EuroCave">EuroCave</option><option value="Kadeka">Kadeka</option><option value="unassigned">待记录位置</option></select>
            <select id="filter-color"><option value="">全部颜色</option></select>
            <select id="filter-category"><option value="">全部用途</option></select>
            <select id="filter-tasting-event"><option value="">全部酒局</option></select>
            <select id="inventory-sort" aria-label="库存排序">
              <option value="default">默认排序</option>
              <option value="window-asc">最佳适饮期：最早优先</option>
              <option value="window-desc">最佳适饮期：最晚优先</option>
            </select>
          </div>
        </div>
        <div class="panel">
          <h3>库存列表</h3>
          <div class="cabinet-layout" aria-label="酒柜位置规则">
            <span><strong>EuroCave</strong>：第 1–3 层前排 / 后排；第 4–5 层前排 / 后排、上层 / 下层</span>
            <span><strong>Kadeka</strong>：第 1–6 层单层</span>
            <span>位置编号均从左到右。</span>
          </div>
          <div id="inventory-mobile-list" class="inventory-mobile-list"></div>
          <div id="inventory-table" class="table-wrap"></div>
        </div>
      </section>

      <section id="cellar-log" class="view">
        <div class="toolbar">
          <h2>Cellar Log</h2>
          <div class="filters">
            <input id="cellar-log-search" placeholder="搜索酒款、生产者、商家或瓶号" />
            <select id="cellar-log-type">
              <option value="">全部流转</option>
              <option value="purchased">购买 / 下单</option>
              <option value="received">到货 / 入库</option>
              <option value="moved">位置变更</option>
              <option value="consumed">开瓶 / 出库</option>
            </select>
          </div>
        </div>
        <div class="panel">
          <h3>酒窖流转</h3>
          <p class="hint">只记录酒的购买、到货、位置和出库，确保库存与实际酒柜一致。</p>
          <div id="cellar-log-table" class="table-wrap"></div>
        </div>
      </section>

      <section id="tasting-notes" class="view">
        <div class="toolbar">
          <h2>Tasting Notes</h2>
          <div class="filters">
            <input id="tasting-note-search" placeholder="搜索品饮过的酒、生产者、年份或感受" />
          </div>
        </div>
        <div class="panel">
          <h3>品鉴反馈</h3>
          <p class="hint">外面喝的酒只在这里记录；家里开瓶时，库存出库与品鉴感受也分别保存。</p>
          <div id="tasting-note-table" class="table-wrap"></div>
        </div>
      </section>

    </main>

    <div id="toast" role="status"></div>
    <script src="/app.js"></script>
  </body>
</html>
